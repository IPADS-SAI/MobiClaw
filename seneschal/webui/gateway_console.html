<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seneschal Console</title>
    <style>
      :root {
        --bg: #f4f6ef;
        --ink: #20241f;
        --muted: #5a665a;
        --line: #d8dfd2;
        --accent: #105f4a;
        --danger: #b42318;
        --mono: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
        --sans: "Work Sans", "PingFang SC", "Noto Sans SC", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 0%, #dce8ce 0%, transparent 30%),
          radial-gradient(circle at 90% 100%, #f3dbbd 0%, transparent 26%),
          var(--bg);
      }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 18px 40px; }
      h1 { margin: 0; letter-spacing: 0.03em; font-size: 30px; }
      .sub { margin-top: 8px; color: var(--muted); font-size: 14px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
      .nav { display: flex; gap: 8px; }
      .nav a {
        text-decoration: none;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
      }
      .nav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .grid { margin-top: 24px; display: grid; gap: 14px; grid-template-columns: repeat(12, 1fr); }
      .panel {
        grid-column: span 12;
        background: linear-gradient(160deg, #fffffc, #f8fbf6);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(31, 34, 27, 0.08);
      }
      .panel h2 { margin: 0 0 14px; font-size: 17px; }
      .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .fields { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .fields.compact { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--muted); }
      input, select, textarea, button { font: inherit; }
      input, select, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        padding: 9px 10px;
      }
      textarea { min-height: 110px; resize: vertical; }
      .btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 9px 13px;
        cursor: pointer;
        color: #fff;
        background: var(--accent);
      }
      button.alt { background: #486a62; }
      button.danger { background: var(--danger); }
      .row { display: flex; align-items: center; gap: 8px; }
      .row input[type="checkbox"] { width: auto; }
      .status {
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        font-size: 13px;
      }
      .mono { font-family: var(--mono); }
      .logs { display: grid; gap: 10px; }
      pre {
        margin: 0;
        background: #1b1f1c;
        color: #d7f4d6;
        border-radius: 10px;
        padding: 10px;
        overflow: auto;
        max-height: 260px;
        font-size: 12px;
      }
      .files { margin-top: 12px; display: grid; gap: 8px; }
      .file-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: #fff;
      }
      .hint { font-size: 12px; color: var(--muted); }
      .chat-window {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        height: 360px;
        overflow: auto;
        padding: 10px;
        display: grid;
        gap: 8px;
      }
      .msg {
        max-width: 86%;
        border-radius: 10px;
        padding: 9px 10px;
        white-space: pre-wrap;
        line-height: 1.4;
        font-size: 13px;
      }
      .msg.user { justify-self: end; background: #dff2e8; border: 1px solid #b6ddca; }
      .msg.agent { justify-self: start; background: #f6f8fa; border: 1px solid #d9e2e8; }
      .msg.system { justify-self: center; background: #fff8e6; border: 1px solid #f0d7a9; color: #7b5718; }
      .msg.error { justify-self: start; background: #fde8e8; border: 1px solid #f6bcbc; color: #8a1f1f; }
      .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

      @media (max-width: 900px) {
        .fields, .fields.compact { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>Seneschal Console</h1>
          <div class="sub">任务下发与 Gateway 通信</div>
        </div>
        <div class="nav">
          <a href="/console/chat">聊天</a>
          <a class="active" href="/console">控制台</a>
          <a href="/console/settings">设置</a>
        </div>
      </div>

      <div class="grid">
        <section class="panel">
          <h2>当前连接配置</h2>
          <div id="cfg-status" class="status">状态: <strong>未读取</strong></div>
          <div class="hint">请在设置页维护 Base URL / API Key。这里仅显示并使用配置。</div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>对话交互窗口</h2>
            <div class="btns" style="margin-top: 0;">
              <button id="btn-clear-chat" class="alt">清空对话</button>
            </div>
          </div>
          <div id="chat-window" class="chat-window"></div>
        </section>

        <section class="panel">
          <h2>任务下发</h2>
          <div class="fields">
            <label>
              任务内容
              <textarea id="task-text" placeholder="请输入任务，例如：请生成一份项目周报并保存到 /tmp/report.md"></textarea>
            </label>
            <label>
              output_path
              <input id="task-output-path" placeholder="可选，例如 /tmp/output.md" />
              <span class="hint">后端会尝试将该路径纳入结果文件列表。</span>
            </label>
          </div>

          <div class="fields compact" style="margin-top: 10px;">
            <label>
              mode
              <select id="task-mode">
                <option value="chat" selected>chat</option>
                <option value="router">router</option>
                <option value="intelligent">intelligent</option>
                <option value="worker">worker</option>
                <option value="steward">steward</option>
                <option value="auto">auto</option>
              </select>
            </label>
            <label>
              agent_hint
              <input id="task-agent-hint" placeholder="可选" />
            </label>
            <label>
              skill_hint
              <input id="task-skill-hint" placeholder="可选" />
            </label>
            <label>
              routing_strategy
              <input id="task-routing-strategy" placeholder="可选" />
            </label>
            <label>
              context_id
              <input id="task-context-id" placeholder="可选" />
              <div class="row" style="margin-top: 6px;">
                <select id="task-context-history" class="mono" style="flex: 1 1 auto;">
                  <option value="">选择历史 session/context</option>
                </select>
                <button id="btn-refresh-contexts" class="alt" type="button">刷新</button>
              </div>
            </label>
            <label>
              webhook_url
              <input id="task-webhook-url" placeholder="异步任务可选" />
            </label>
            <label>
              webhook_token
              <input id="task-webhook-token" placeholder="可选" />
            </label>
            <label>
              callback_headers(JSON)
              <input id="task-callback-headers" placeholder='{"X-Trace-Id":"demo"}' />
            </label>
          </div>

          <div class="row" style="margin-top: 10px;">
            <input id="task-async" type="checkbox" checked />
            <label for="task-async" style="margin: 0;">异步模式 (async_mode)</label>
          </div>

          <div class="btns">
            <button id="btn-submit-task">提交任务</button>
            <button id="btn-stop-poll" class="danger">停止轮询</button>
          </div>

          <div id="task-status" class="status">任务状态: <strong>未提交</strong></div>
          <div class="fields" style="margin-top: 10px;">
            <label>
              当前 Job ID
              <input id="current-job-id" class="mono" placeholder="提交异步任务后自动填充" />
            </label>
            <div class="btns" style="align-self: end; margin-top: 0;">
              <button id="btn-query-job" class="alt">手动查询 Job</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>结果与通信日志</h2>
          <div class="logs">
            <div>
              <div class="hint">最近一次请求</div>
              <pre id="req-log">(empty)</pre>
            </div>
            <div>
              <div class="hint">最近一次响应</div>
              <pre id="resp-log">(empty)</pre>
            </div>
          </div>
          <div class="files" id="file-list"></div>
        </section>
      </div>
    </div>

    <script>
      const cfgKey = "seneschal_gateway_console_config_v1";
      let pollingTimer = null;
      const renderedResultJobs = new Set();
      const chatMessages = [];
      let contextSessions = [];

      const el = {
        cfgStatus: document.getElementById("cfg-status"),
        taskText: document.getElementById("task-text"),
        taskOutputPath: document.getElementById("task-output-path"),
        taskMode: document.getElementById("task-mode"),
        taskAgentHint: document.getElementById("task-agent-hint"),
        taskSkillHint: document.getElementById("task-skill-hint"),
        taskRoutingStrategy: document.getElementById("task-routing-strategy"),
        taskContextId: document.getElementById("task-context-id"),
        taskContextHistory: document.getElementById("task-context-history"),
        btnRefreshContexts: document.getElementById("btn-refresh-contexts"),
        taskWebhookUrl: document.getElementById("task-webhook-url"),
        taskWebhookToken: document.getElementById("task-webhook-token"),
        taskCallbackHeaders: document.getElementById("task-callback-headers"),
        taskAsync: document.getElementById("task-async"),
        btnSubmitTask: document.getElementById("btn-submit-task"),
        btnStopPoll: document.getElementById("btn-stop-poll"),
        btnQueryJob: document.getElementById("btn-query-job"),
        btnClearChat: document.getElementById("btn-clear-chat"),
        taskStatus: document.getElementById("task-status"),
        currentJobId: document.getElementById("current-job-id"),
        chatWindow: document.getElementById("chat-window"),
        reqLog: document.getElementById("req-log"),
        respLog: document.getElementById("resp-log"),
        fileList: document.getElementById("file-list"),
      };

      function normalizeBaseUrl(raw) {
        const value = (raw || "").trim();
        if (!value) {
          return window.location.origin || "http://127.0.0.1:8090";
        }
        try {
          const u = new URL(value, window.location.origin);
          return `${u.protocol}//${u.host}`;
        } catch (_) {
          return value.replace(/\/+$/, "");
        }
      }

      function getConfig() {
        const raw = localStorage.getItem(cfgKey);
        let parsed = {};
        if (raw) {
          try {
            parsed = JSON.parse(raw) || {};
          } catch (_) {
            parsed = {};
          }
        }
        return {
          baseUrl: normalizeBaseUrl(parsed.baseUrl || window.location.origin),
          apiKey: (parsed.apiKey || "").trim(),
          pollMs: Number(parsed.pollMs || 2000),
          timeoutMs: Number(parsed.timeoutMs || 30000),
        };
      }

      function renderConfigStatus() {
        const cfg = getConfig();
        const masked = cfg.apiKey ? `${cfg.apiKey.slice(0, 4)}***` : "(未配置)";
        el.cfgStatus.innerHTML = `状态: <strong>base=${cfg.baseUrl}; api_key=${masked}</strong>`;
      }

      function setTaskStatus(text, kind) {
        const color = kind === "error" ? "#b42318" : kind === "running" ? "#d58f2e" : "#105f4a";
        el.taskStatus.innerHTML = `任务状态: <strong style="color:${color}">${text}</strong>`;
      }

      function nowTime() {
        return new Date().toLocaleTimeString("zh-CN", { hour12: false });
      }

      function pushChatMessage(role, text, meta = "") {
        chatMessages.push({ role, text: String(text || ""), meta: meta || nowTime() });
        renderChat();
      }

      function normalizeChatRole(role) {
        const r = String(role || "").trim().toLowerCase();
        if (r === "assistant" || r === "agent" || r === "bot") return "agent";
        if (r === "user") return "user";
        if (r === "error") return "error";
        return "system";
      }

      function extractContextIdFromTaskResult(taskResult) {
        if (!taskResult || typeof taskResult !== "object") return "";
        const result = taskResult.result && typeof taskResult.result === "object" ? taskResult.result : {};
        const direct = String(result.context_id || result.session_id || "").trim();
        if (direct) return direct;
        const session = result.session && typeof result.session === "object" ? result.session : {};
        return String(session.context_id || session.session_id || "").trim();
      }

      function setContextSessionOptions(selected = "") {
        const selectedValue = String(selected || "").trim() || String(el.taskContextId.value || "").trim();
        el.taskContextHistory.innerHTML = "";

        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "选择历史 session/context";
        el.taskContextHistory.appendChild(placeholder);

        contextSessions.forEach((item) => {
          const contextId = String(item.context_id || item.session_id || "").trim();
          if (!contextId) return;
          const option = document.createElement("option");
          option.value = contextId;
          const updatedAt = String(item.updated_at || "").trim();
          option.textContent = updatedAt ? `${contextId} · ${updatedAt}` : contextId;
          el.taskContextHistory.appendChild(option);
        });

        if (selectedValue) {
          el.taskContextHistory.value = selectedValue;
        }
      }

      function upsertContextSession(contextId) {
        const value = String(contextId || "").trim();
        if (!value) return;
        const nowIso = new Date().toISOString();
        contextSessions = contextSessions.filter((s) => String(s.context_id || s.session_id || "").trim() !== value);
        contextSessions.unshift({ context_id: value, session_id: value, updated_at: nowIso });
        setContextSessionOptions(value);
      }

      function renderLoadedSessionMessages(messages) {
        chatMessages.length = 0;
        renderedResultJobs.clear();
        (Array.isArray(messages) ? messages : []).forEach((item) => {
          if (!item || typeof item !== "object") return;
          const role = normalizeChatRole(item.role);
          const text = String(item.text || "").trim();
          if (!text) return;
          const ts = String(item.ts || "").trim();
          const meta = ts ? `LOADED · ${ts}` : `LOADED · ${nowTime()}`;
          chatMessages.push({ role, text, meta });
        });
        renderChat();
      }

      async function refreshContextSessions(selected = "") {
        const resp = await requestJson("/api/v1/chat/sessions", {
          method: "GET",
          headers: authHeaders({ "Content-Type": "application/json" }),
        });
        contextSessions = Array.isArray(resp.sessions) ? resp.sessions : [];
        setContextSessionOptions(selected);
        return contextSessions;
      }

      async function loadContextSession(contextId) {
        const value = String(contextId || "").trim();
        if (!value) return;
        const resp = await requestJson(`/api/v1/chat/sessions/${encodeURIComponent(value)}?limit=20`, {
          method: "GET",
          headers: authHeaders({ "Content-Type": "application/json" }),
        });
        const messages = Array.isArray(resp.messages) ? resp.messages : [];
        renderLoadedSessionMessages(messages);
        el.taskContextId.value = value;
        upsertContextSession(value);
        pushChatMessage("system", `已加载指定会话: ${value}（最近 ${messages.length} 条消息）`, `SYSTEM · ${nowTime()}`);
      }

      function renderChat() {
        el.chatWindow.innerHTML = "";
        if (chatMessages.length === 0) {
          const empty = document.createElement("div");
          empty.className = "hint";
          empty.textContent = "暂无对话，提交任务后会显示 agent 对话输出。";
          el.chatWindow.appendChild(empty);
          return;
        }
        chatMessages.forEach((m) => {
          const box = document.createElement("div");
          box.className = `msg ${m.role}`;
          const meta = document.createElement("div");
          meta.className = "msg-meta";
          meta.textContent = m.meta || "";
          const body = document.createElement("div");
          body.textContent = m.text;
          box.appendChild(meta);
          box.appendChild(body);
          el.chatWindow.appendChild(box);
        });
        el.chatWindow.scrollTop = el.chatWindow.scrollHeight;
      }

      function appendAgentConversation(taskResult) {
        if (!taskResult || !taskResult.job_id) {
          return;
        }
        if (renderedResultJobs.has(taskResult.job_id)) {
          return;
        }
        renderedResultJobs.add(taskResult.job_id);

        if (taskResult.status === "failed") {
          pushChatMessage("error", `任务失败(job=${taskResult.job_id})\n${taskResult.error || "unknown error"}`, `ERROR · ${nowTime()}`);
          return;
        }

        const result = taskResult.result || {};
        const trace = result.routing_trace && typeof result.routing_trace === "object" ? result.routing_trace : {};
        const stages = Array.isArray(trace.stages) ? trace.stages : [];

        stages.forEach((stage, idx) => {
          const subtasks = Array.isArray(stage.subtasks) ? stage.subtasks : [];
          subtasks.forEach((item, subIdx) => {
            const agent = item.agent || "agent";
            const subtaskText = String(item.task || "").trim();
            const reply = String(item.reply || "").trim() || "(无文本输出)";
            const text = subtaskText ? `子任务: ${subtaskText}\n\n${reply}` : reply;
            pushChatMessage("agent", text, `Stage ${idx + 1}.${subIdx + 1} · ${agent} · ${nowTime()}`);
          });
        });

        const finalReply = String(result.reply || "").trim();
        if (finalReply) {
          pushChatMessage("agent", finalReply, `Final Reply · ${nowTime()}`);
        } else if (stages.length === 0) {
          pushChatMessage("system", `任务完成(job=${taskResult.job_id})，但无文本输出。`, `SYSTEM · ${nowTime()}`);
        }
      }

      function writeReqLog(data) {
        el.reqLog.textContent = JSON.stringify(data, null, 2);
      }

      function writeRespLog(data) {
        el.respLog.textContent = JSON.stringify(data, null, 2);
      }

      function authHeaders(baseHeaders = {}) {
        const cfg = getConfig();
        const headers = { ...baseHeaders };
        if (cfg.apiKey) {
          headers.Authorization = `Bearer ${cfg.apiKey}`;
        }
        return headers;
      }

      async function requestJson(path, options = {}) {
        const cfg = getConfig();
        const url = `${cfg.baseUrl}${path}`;
        writeReqLog({
          url,
          method: options.method || "GET",
          headers: options.headers || {},
          body: options.body ? JSON.parse(options.body) : null,
        });

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), Math.max(1000, cfg.timeoutMs || 30000));
        try {
          const resp = await fetch(url, { ...options, signal: controller.signal });
          const text = await resp.text();
          let json;
          try {
            json = text ? JSON.parse(text) : null;
          } catch (_) {
            json = { raw: text };
          }
          writeRespLog({ status: resp.status, ok: resp.ok, body: json });
          if (!resp.ok) {
            const detail = (json && (json.detail || json.error || json.message || json.raw)) || "";
            throw new Error(detail ? `HTTP ${resp.status}: ${detail}` : `HTTP ${resp.status}`);
          }
          return json;
        } finally {
          clearTimeout(timeout);
        }
      }

      function buildTaskPayload() {
        const callbackHeadersRaw = (el.taskCallbackHeaders.value || "").trim();
        let callbackHeaders = {};
        if (callbackHeadersRaw) {
          callbackHeaders = JSON.parse(callbackHeadersRaw);
        }
        return {
          task: (el.taskText.value || "").trim(),
          async_mode: !!el.taskAsync.checked,
          output_path: (el.taskOutputPath.value || "").trim() || null,
          mode: (el.taskMode.value || "chat").trim() || "chat",
          agent_hint: (el.taskAgentHint.value || "").trim() || null,
          skill_hint: (el.taskSkillHint.value || "").trim() || null,
          routing_strategy: (el.taskRoutingStrategy.value || "").trim() || null,
          context_id: (el.taskContextId.value || "").trim() || null,
          webhook_url: (el.taskWebhookUrl.value || "").trim() || null,
          webhook_token: (el.taskWebhookToken.value || "").trim() || null,
          callback_headers: callbackHeaders,
        };
      }

      function stopPolling() {
        if (pollingTimer) {
          clearInterval(pollingTimer);
          pollingTimer = null;
        }
      }

      function renderFiles(files) {
        el.fileList.innerHTML = "";
        if (!Array.isArray(files) || files.length === 0) {
          return;
        }
        files.forEach((file) => {
          const wrap = document.createElement("div");
          wrap.className = "file-item";
          const left = document.createElement("div");
          left.innerHTML = `<div><strong>${file.name || "(unknown)"}</strong></div>
            <div class="hint mono">${file.path || ""}</div>
            <div class="hint">size: ${file.size || 0} bytes</div>`;
          const btn = document.createElement("button");
          btn.textContent = "下载";
          btn.className = "alt";
          btn.onclick = async () => {
            try {
              await downloadFile(file);
            } catch (err) {
              setTaskStatus(`下载失败: ${err.message || err}`, "error");
            }
          };
          wrap.appendChild(left);
          wrap.appendChild(btn);
          el.fileList.appendChild(wrap);
        });
      }

      async function downloadFile(file) {
        const cfg = getConfig();
        const url = (file.download_url || "").startsWith("http")
          ? file.download_url
          : `${cfg.baseUrl}${file.download_url || ""}`;
        if (!url) {
          throw new Error("文件下载地址为空");
        }
        const resp = await fetch(url, { method: "GET", headers: authHeaders() });
        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }
        const blob = await resp.blob();
        const tempUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = tempUrl;
        a.download = file.name || "download.bin";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(tempUrl);
      }

      async function queryJob(jobId) {
        if (!jobId) {
          throw new Error("job_id 为空");
        }
        const resp = await requestJson(`/api/v1/jobs/${encodeURIComponent(jobId)}`, {
          method: "GET",
          headers: authHeaders({ "Content-Type": "application/json" }),
        });
        setTaskStatus(
          `${resp.status} | ${resp.job_id}`,
          resp.status === "failed" ? "error" : resp.status === "running" || resp.status === "queued" ? "running" : "ok",
        );
        const files = resp.result && Array.isArray(resp.result.files) ? resp.result.files : [];
        renderFiles(files);
        const contextId = extractContextIdFromTaskResult(resp);
        if (contextId) {
          el.taskContextId.value = contextId;
          upsertContextSession(contextId);
        }
        if (resp.status === "completed" || resp.status === "failed") {
          appendAgentConversation(resp);
        }
        return resp;
      }

      function startPolling(jobId) {
        stopPolling();
        const cfg = getConfig();
        const delay = Math.max(500, Number(cfg.pollMs) || 2000);
        pollingTimer = setInterval(async () => {
          try {
            const data = await queryJob(jobId);
            if (data.status === "completed" || data.status === "failed") {
              stopPolling();
            }
          } catch (err) {
            setTaskStatus(`轮询失败: ${err.message || err}`, "error");
          }
        }, delay);
      }

      async function submitTask() {
        try {
          const payload = buildTaskPayload();
          if (!payload.task) {
            throw new Error("任务内容不能为空");
          }

          pushChatMessage("user", payload.task, `USER · ${nowTime()}`);
          pushChatMessage("system", "任务已提交，等待网关响应...", `SYSTEM · ${nowTime()}`);
          setTaskStatus("提交中...", "running");

          const resp = await requestJson("/api/v1/task", {
            method: "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify(payload),
          });

          el.currentJobId.value = resp.job_id || "";
          setTaskStatus(
            `${resp.status} | ${resp.job_id}`,
            resp.status === "failed" ? "error" : resp.status === "running" || resp.status === "queued" ? "running" : "ok",
          );

          const files = resp.result && Array.isArray(resp.result.files) ? resp.result.files : [];
          renderFiles(files);
          const contextId = extractContextIdFromTaskResult(resp);
          if (contextId) {
            el.taskContextId.value = contextId;
            upsertContextSession(contextId);
          }

          if (payload.async_mode && resp.job_id) {
            pushChatMessage("system", `异步任务已入队，job_id=${resp.job_id}`, `SYSTEM · ${nowTime()}`);
            startPolling(resp.job_id);
          } else {
            appendAgentConversation(resp);
            stopPolling();
          }
        } catch (err) {
          setTaskStatus(err.message || String(err), "error");
          pushChatMessage("error", String(err.message || err), `ERROR · ${nowTime()}`);
        }
      }

      el.btnSubmitTask.addEventListener("click", submitTask);
      el.btnRefreshContexts.addEventListener("click", async () => {
        try {
          await refreshContextSessions(el.taskContextId.value || "");
          setTaskStatus("会话列表已刷新", "ok");
        } catch (err) {
          setTaskStatus(`刷新会话列表失败: ${err.message || err}`, "error");
          pushChatMessage("error", String(err.message || err), `ERROR · ${nowTime()}`);
        }
      });
      el.taskContextHistory.addEventListener("change", async (event) => {
        const selected = String(event.target.value || "").trim();
        if (!selected) return;
        try {
          await loadContextSession(selected);
          setTaskStatus(`已加载会话 ${selected}`, "ok");
        } catch (err) {
          setTaskStatus(`加载会话失败: ${err.message || err}`, "error");
          pushChatMessage("error", String(err.message || err), `ERROR · ${nowTime()}`);
        }
      });
      el.btnStopPoll.addEventListener("click", () => {
        stopPolling();
        setTaskStatus("已停止轮询", "ok");
        pushChatMessage("system", "已停止轮询。", `SYSTEM · ${nowTime()}`);
      });
      el.btnQueryJob.addEventListener("click", async () => {
        try {
          await queryJob((el.currentJobId.value || "").trim());
        } catch (err) {
          setTaskStatus(err.message || String(err), "error");
          pushChatMessage("error", String(err.message || err), `ERROR · ${nowTime()}`);
        }
      });
      el.btnClearChat.addEventListener("click", () => {
        chatMessages.length = 0;
        renderedResultJobs.clear();
        renderChat();
      });

      renderConfigStatus();
      refreshContextSessions().catch(() => {
        // Ignore list loading failures at startup; user can retry manually.
      });
      setTaskStatus("就绪", "ok");
      renderChat();
    </script>
  </body>
</html>
